<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSMART - Đăng nhập</title>
    <link rel="stylesheet" href="./CSS/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <img src="image/background.jpg" alt="background" class="background">
    <div class="container">
        <div class="login-card">
            <h1>Đăng nhập</h1>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Nhập tên đăng nhập" id="username" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Nhập mật khẩu" id="password" required>
                </div>
                <div class="forgot-pass">
                    <a href="#">Quên mật khẩu</a>
                </div>
                <div class="register-link">
                    <p>Bạn chưa có tài khoản?</p>
                    <a href="register.html">đăng ký ngay</a>
                </div>
            </form>
            <img src="image/Ảnh mô phỏng.png" alt="Chibi character" class="char-chibi">
        </div>

        <div class="welcome-text">
            <h2>CHÀO MỪNG BẠN ĐẾN VỚI JSMART</h2>
            <h3>TRUNG TÂM TIẾNG NHẬT HÀNG ĐẦU VIỆT NAM</h3>
            <img src="image/study.png" alt="Study character" class="char-study">
        </div>
    </div>
    <script src="./JS/Login.js"></script>
</body>
</html>
